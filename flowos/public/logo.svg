<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FlowOS">
  <defs>
    <linearGradient id="flowos-grad" x1="21" y1="16" x2="99" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Hexagon outline (benzene ring ⌬) -->
  <polygon
    points="60,16 98.1,38 98.1,82 60,104 21.9,82 21.9,38"
    stroke="url(#flowos-grad)"
    stroke-width="7"
    stroke-linejoin="round"
    fill="none"/>
  <!-- Inscribed circle -->
  <circle
    cx="60" cy="60" r="25"
    stroke="url(#flowos-grad)"
    stroke-width="5.5"
    fill="none"/>
</svg>
